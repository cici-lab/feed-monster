<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 身体渐变 - 紫蓝色 -->
    <radialGradient id="fangBodyGradient" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#b088d8"/>
      <stop offset="40%" style="stop-color:#8858b8"/>
      <stop offset="100%" style="stop-color:#5a3088"/>
    </radialGradient>
    <!-- 毛发渐变 -->
    <radialGradient id="furGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#9060c0"/>
      <stop offset="100%" style="stop-color:#6838a0"/>
    </radialGradient>
    <!-- 阴影 -->
    <filter id="fangShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#2a1048" flood-opacity="0.4"/>
    </filter>
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 地面阴影 -->
  <ellipse cx="100" cy="175" rx="50" ry="12" fill="#1a1030" opacity="0.3"/>
  
  <!-- 左脚 -->
  <ellipse cx="65" cy="170" rx="20" ry="12" fill="#4a2080"/>
  <ellipse cx="60" cy="167" rx="8" ry="5" fill="#7050a0" opacity="0.5"/>
  
  <!-- 右脚 -->
  <ellipse cx="135" cy="170" rx="20" ry="12" fill="#4a2080"/>
  <ellipse cx="130" cy="167" rx="8" ry="5" fill="#7050a0" opacity="0.5"/>
  
  <!-- 身体主体 - 略扁圆形 -->
  <ellipse cx="100" cy="100" rx="65" ry="70" fill="url(#fangBodyGradient)" filter="url(#fangShadow)"/>
  
  <!-- 毛发纹理效果 -->
  <g opacity="0.3">
    <ellipse cx="100" cy="100" rx="62" ry="67" fill="none" stroke="#a068d0" stroke-width="8" stroke-dasharray="4 8"/>
    <ellipse cx="100" cy="100" rx="58" ry="63" fill="none" stroke="#b078e0" stroke-width="4" stroke-dasharray="3 6"/>
  </g>
  
  <!-- 身体高光 -->
  <ellipse cx="75" cy="65" rx="25" ry="20" fill="#c0a0e8" opacity="0.3"/>
  <ellipse cx="70" cy="60" rx="12" ry="10" fill="#ffffff" opacity="0.35"/>
  
  <!-- 身体斑点（类似毛怪） -->
  <ellipse cx="60" cy="130" rx="18" ry="12" fill="#382068" opacity="0.4"/>
  <ellipse cx="140" cy="125" rx="15" ry="10" fill="#382068" opacity="0.4"/>
  <ellipse cx="85" cy="145" rx="10" ry="7" fill="#382068" opacity="0.3"/>
  
  <!-- 头顶双角 -->
  <path d="M 55 35 Q 45 10 60 5 Q 75 10 70 35" fill="#7050a0"/>
  <path d="M 58 30 Q 52 15 60 10 Q 68 15 66 30" fill="#9070c0"/>
  <ellipse cx="60" cy="8" rx="6" ry="5" fill="#a080d0"/>
  
  <path d="M 130 35 Q 120 10 135 5 Q 150 10 145 35" fill="#7050a0"/>
  <path d="M 134 30 Q 128 15 135 10 Q 142 15 140 30" fill="#9070c0"/>
  <ellipse cx="135" cy="8" rx="6" ry="5" fill="#a080d0"/>
  
  <!-- 眉毛 -->
  <path d="M 50 65 Q 65 55 80 65" fill="none" stroke="#4a2878" stroke-width="4" stroke-linecap="round"/>
  <path d="M 120 65 Q 135 55 150 65" fill="none" stroke="#4a2878" stroke-width="4" stroke-linecap="round"/>
  
  <!-- 左眼 - 眯眯眼发光效果 -->
  <ellipse cx="65" cy="80" rx="22" ry="18" fill="#ffffff" opacity="0.15"/>
  <path d="M 48 80 Q 65 65 82 80" fill="none" stroke="#ffe050" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 50 80 Q 65 68 80 80" fill="none" stroke="#fff8a0" stroke-width="3" stroke-linecap="round"/>
  <!-- 眼睛睁开时的瞳孔暗示 -->
  <ellipse cx="65" cy="77" rx="4" ry="3" fill="#201040" opacity="0.4"/>
  
  <!-- 右眼 - 眯眯眼发光效果 -->
  <ellipse cx="135" cy="80" rx="22" ry="18" fill="#ffffff" opacity="0.15"/>
  <path d="M 118 80 Q 135 65 152 80" fill="none" stroke="#ffe050" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 120 80 Q 135 68 150 80" fill="none" stroke="#fff8a0" stroke-width="3" stroke-linecap="round"/>
  <!-- 眼睛睁开时的瞳孔暗示 -->
  <ellipse cx="135" cy="77" rx="4" ry="3" fill="#201040" opacity="0.4"/>
  
  <!-- 鼻子 -->
  <ellipse cx="100" cy="105" rx="10" ry="8" fill="#503080"/>
  <ellipse cx="100" cy="103" rx="4" ry="3" fill="#7050a0" opacity="0.5"/>
  
  <!-- 嘴巴 -->
  <path d="M 60 130 Q 100 160 140 130" fill="#302050"/>
  <path d="M 70 130 Q 100 155 130 130" fill="#401030"/>
  
  <!-- 尖牙 - 上排 -->
  <polygon points="72,128 68,145 76,145" fill="#fffff8"/>
  <polygon points="88,128 85,142 91,142" fill="#fffff8"/>
  <polygon points="100,126 96,148 104,148" fill="#fffff8"/>
  <polygon points="112,128 109,142 115,142" fill="#fffff8"/>
  <polygon points="128,128 124,145 132,145" fill="#fffff8"/>
  
  <!-- 尖牙 - 下排（较小） -->
  <polygon points="80,148 77,138 83,138" fill="#fffff0"/>
  <polygon points="95,150 92,140 98,140" fill="#fffff0"/>
  <polygon points="105,150 102,140 108,140" fill="#fffff0"/>
  <polygon points="120,148 117,138 123,138" fill="#fffff0"/>
  
  <!-- 舌头 -->
  <ellipse cx="100" cy="152" rx="15" ry="8" fill="#ff5080"/>
  <ellipse cx="100" cy="150" rx="8" ry="4" fill="#ff80a0" opacity="0.5"/>
  
  <!-- 腮红 -->
  <ellipse cx="35" cy="110" rx="12" ry="8" fill="#ff80a0" opacity="0.25"/>
  <ellipse cx="165" cy="110" rx="12" ry="8" fill="#ff80a0" opacity="0.25"/>
  
  <!-- 小手臂 -->
  <ellipse cx="25" cy="115" rx="15" ry="10" fill="#6838a0" transform="rotate(-20 25 115)"/>
  <ellipse cx="175" cy="115" rx="15" ry="10" fill="#6838a0" transform="rotate(20 175 115)"/>
</svg>