<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 身体渐变 - 明亮绿色 -->
    <radialGradient id="mikeBodyGradient" cx="35%" cy="30%" r="65%">
      <stop offset="0%" style="stop-color:#8fffb0"/>
      <stop offset="40%" style="stop-color:#50d878"/>
      <stop offset="100%" style="stop-color:#28a858"/>
    </radialGradient>
    <!-- 眼睛渐变 -->
    <radialGradient id="mikeEyeGradient" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </radialGradient>
    <!-- 阴影滤镜 -->
    <filter id="mikeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#1a5030" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- 地面阴影 -->
  <ellipse cx="100" cy="180" rx="45" ry="10" fill="#1a3a25" opacity="0.25"/>
  
  <!-- 左腿 -->
  <rect x="68" y="145" width="14" height="35" rx="7" fill="#28a858"/>
  <rect x="70" y="148" width="6" height="30" fill="#3dc878" opacity="0.3"/>
  
  <!-- 右腿 -->
  <rect x="118" y="145" width="14" height="35" rx="7" fill="#28a858"/>
  <rect x="120" y="148" width="6" height="30" fill="#3dc878" opacity="0.3"/>
  
  <!-- 左脚 -->
  <ellipse cx="75" cy="178" rx="18" ry="8" fill="#1a8848"/>
  <ellipse cx="72" cy="176" rx="6" ry="4" fill="#3dc878" opacity="0.4"/>
  
  <!-- 右脚 -->
  <ellipse cx="125" cy="178" rx="18" ry="8" fill="#1a8848"/>
  <ellipse cx="122" cy="176" rx="6" ry="4" fill="#3dc878" opacity="0.4"/>
  
  <!-- 身体主体 - 圆球形 -->
  <circle cx="100" cy="85" r="75" fill="url(#mikeBodyGradient)" filter="url(#mikeShadow)"/>
  
  <!-- 身体高光 -->
  <ellipse cx="70" cy="55" rx="35" ry="30" fill="#aaffcc" opacity="0.25"/>
  <ellipse cx="65" cy="50" rx="18" ry="15" fill="#ffffff" opacity="0.35"/>
  
  <!-- 头顶小角 -->
  <ellipse cx="65" cy="18" rx="10" ry="16" fill="#38b868" transform="rotate(-20 65 18)"/>
  <ellipse cx="65" cy="10" rx="5" ry="9" fill="#60e090" transform="rotate(-20 65 10)"/>
  
  <ellipse cx="100" cy="12" rx="8" ry="14" fill="#38b868"/>
  <ellipse cx="100" cy="5" rx="4" ry="8" fill="#60e090"/>
  
  <ellipse cx="135" cy="18" rx="10" ry="16" fill="#38b868" transform="rotate(20 135 18)"/>
  <ellipse cx="135" cy="10" rx="5" ry="9" fill="#60e090" transform="rotate(20 135 10)"/>
  
  <!-- 大眼睛 - 眼白 -->
  <circle cx="100" cy="80" r="45" fill="url(#mikeEyeGradient)"/>
  <circle cx="100" cy="80" r="45" fill="none" stroke="#2a6040" stroke-width="3"/>
  
  <!-- 虹膜 - 翠绿色 -->
  <circle cx="103" cy="80" r="32" fill="#48c878"/>
  <circle cx="103" cy="80" r="28" fill="#38b068"/>
  <circle cx="103" cy="80" r="24" fill="#2a9858"/>
  
  <!-- 虹膜纹理 -->
  <circle cx="103" cy="80" r="26" fill="none" stroke="#208048" stroke-width="1" opacity="0.3"/>
  <circle cx="103" cy="80" r="20" fill="none" stroke="#208048" stroke-width="0.5" opacity="0.2"/>
  
  <!-- 瞳孔 -->
  <circle cx="105" cy="80" r="14" fill="#0a2018"/>
  
  <!-- 瞳孔高光 -->
  <circle cx="115" cy="70" r="8" fill="#ffffff"/>
  <circle cx="100" cy="90" r="4" fill="#ffffff" opacity="0.7"/>
  <circle cx="110" cy="88" r="2" fill="#ffffff" opacity="0.5"/>
  
  <!-- 嘴巴 - 微笑 -->
  <path d="M 70 125 Q 100 145 130 125" fill="#1a5838"/>
  <path d="M 75 125 Q 100 142 125 125" fill="#382828"/>
  
  <!-- 舌头 -->
  <ellipse cx="100" cy="138" rx="12" ry="6" fill="#ff6688"/>
  
  <!-- 腮红 -->
  <ellipse cx="40" cy="100" rx="12" ry="8" fill="#ff8888" opacity="0.25"/>
  <ellipse cx="160" cy="100" rx="12" ry="8" fill="#ff8888" opacity="0.25"/>
  
  <!-- 手臂 - 细小可爱 -->
  <ellipse cx="30" cy="100" rx="12" ry="8" fill="#38b868" transform="rotate(-30 30 100)"/>
  <ellipse cx="170" cy="100" rx="12" ry="8" fill="#38b868" transform="rotate(30 170 100)"/>
</svg>